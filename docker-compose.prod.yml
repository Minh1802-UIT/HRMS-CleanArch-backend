# ============================================================
# Production Docker Compose Override
# ============================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or CI/CD secrets):
#   - JWT_SECRET_KEY: Production JWT signing key (min 32 chars)
#   - MONGO_USER: MongoDB admin username
#   - MONGO_PASSWORD: MongoDB admin password
#   - REDIS_PASSWORD: Redis authentication password
#   - EMAIL_SMTP_HOST: SMTP server
#   - EMAIL_SENDER: Sender email address
#   - EMAIL_PASSWORD: SMTP password
#   - CORS_ALLOWED_ORIGINS: Production frontend URL e.g. https://hrms.yourdomain.com
# ============================================================

services:
  app_backend:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Host header security — must match your production domain
      - AllowedHosts=${CORS_ALLOWED_ORIGINS:-hrms.yourdomain.com}
      # JWT
      - JwtSettings__Key=${JWT_SECRET_KEY}
      # MongoDB (production credentials)
      - EmployeeDatabaseSettings__ConnectionString=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@app_db:27017
      # CORS — override with production frontend URL
      - CorsSettings__AllowedOrigins__0=${CORS_ALLOWED_ORIGINS:-https://hrms.yourdomain.com}
      # Email
      - EmailSettings__SmtpHost=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EmailSettings__SmtpPort=${EMAIL_SMTP_PORT:-587}
      - EmailSettings__SenderEmail=${EMAIL_SENDER}
      - EmailSettings__SenderName=Employee HR System
      - EmailSettings__Username=${EMAIL_SENDER}
      - EmailSettings__Password=${EMAIL_PASSWORD}
      - EmailSettings__EnableSsl=true
      # Redis with password
      - RedisSettings__ConnectionString=app_cache:6379,password=${REDIS_PASSWORD}
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  app_cache:
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  app_frontend:
    image: ${DOCKER_USERNAME}/employee-hr-ui:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
